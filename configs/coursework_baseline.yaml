experiment_name: cxr_coursework_baseline
experiment_dir: experiments/coursework_baseline
mlflow_tracking_uri: sqlite:///experiments/coursework_baseline/mlflow.db
device: cuda

pairs_csv: data/pairs/cxr_consistency_pairs.csv

data:
  include_negative_types:
    - random_report
    - pathology_matched_report
    - distorted_negation

tokenizer_name: microsoft/BiomedVLP-CXR-BERT-specialized
trust_remote_code: true

image_encoder_name: convnext_tiny
text_encoder_name: cxrbert
pretrained_image: true

freeze_image_encoder: false
freeze_text_encoder: false

image_size: 224
max_length: 128

projection_dim: 512
dropout: 0.2

batch_size: 64
epochs: 15

learning_rate: 5e-5
weight_decay: 1e-4

num_workers: 8

loss:
  use_pos_weight: false

log_model: false
log_batch_loss: false
log_every_steps: 100

tokenizer_debug_samples: 16
