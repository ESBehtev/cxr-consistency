experiment_name: cxr_vit_small_hard
experiment_dir: experiments/vit_small_hard
mlflow_tracking_uri: sqlite:///experiments/vit_small_hard/mlflow.db
device: cuda
pairs_csv: data/pairs/cxr_consistency_pairs_hard.csv
data:
  include_negative_types:
  - pathology_matched_report
  - distorted_negation
  - laterality_conflict
  - temporal_mismatch
  - pathology_semantic_swap
  - partial_mismatch
tokenizer_name: microsoft/BiomedVLP-CXR-BERT-specialized
trust_remote_code: true
local_files_only: false
image_encoder_name: vit_small
text_encoder_name: cxrbert
pretrained_image: true
freeze_image_encoder: false
freeze_text_encoder: false
image_size: 224
max_length: 256
projection_dim: 512
dropout: 0.2
batch_size: 32
epochs: 1
learning_rate: 3e-5
weight_decay: 1e-4
grad_clip_norm: 1.0
scheduler_type: none
warmup_ratio: 0.0
amp: true
num_workers: 8
max_train_samples: 2000
max_valid_samples: 500
loss:
  use_pos_weight: false
log_model: false
log_batch_loss: false
log_every_steps: 100
tokenizer_debug_samples: 16
save_checkpoints: false
early_stopping:
  enabled: true
  monitor: valid_roc_auc
  mode: max
  patience: 2
  min_delta: 0.001
