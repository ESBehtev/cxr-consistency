experiment_name: cxr_diag_distorted_negation
experiment_dir: experiments/diag_distorted_negation
mlflow_tracking_uri: sqlite:///experiments/diag_distorted_negation/mlflow.db
device: mps

pairs_csv: data/pairs/cxr_consistency_pairs.csv

data:
  include_negative_types:
    - distorted_negation
  max_positives_per_negative: 1.0

tokenizer_name: simple
trust_remote_code: false

loss:
  use_pos_weight: false

image_encoder_name: mobilenet_v3_small
text_encoder_name: simple

pretrained_image: true

freeze_image_encoder: true
freeze_text_encoder: false

image_size: 224
max_length: 256

projection_dim: 256
dropout: 0.2

batch_size: 8
epochs: 3

learning_rate: 1e-4
weight_decay: 1e-4

num_workers: 0

max_train_samples: 10000
max_valid_samples: 2000

log_model: false
log_batch_loss: false
log_every_steps: 100
