pairs_csv: data/pairs/cxr_consistency_pairs_hard.csv
data:
  include_negative_types:
  - pathology_matched_report
  - distorted_negation
  - laterality_conflict
  - temporal_mismatch
  - pathology_semantic_swap
  - partial_mismatch
tokenizer_name: microsoft/BiomedVLP-CXR-BERT-specialized
trust_remote_code: true
local_files_only: false
text_encoder_name: cxrbert
pretrained_image: true
freeze_image_encoder: false
freeze_text_encoder: false
image_size: 224
projection_dim: 512
dropout: 0.2
learning_rate: 3e-5
weight_decay: 1e-4
grad_clip_norm: 1.0
scheduler_type: cosine
warmup_ratio: 0.05
amp: true
num_workers: 4
max_train_samples: null
max_valid_samples: null
loss:
  use_pos_weight: false
use_mlflow: false
log_model: false
log_batch_loss: false
log_every_steps: 100
tokenizer_debug_samples: 16
save_checkpoints: true
epochs: 20
early_stopping:
  enabled: true
  monitor: valid_roc_auc
  mode: max
  patience: 3
  min_delta: 0.001
collapse_detection:
  min_probs_std: 1.0e-05
  min_logits_std: 1.0e-05
  weak_auc: 0.55
  weak_probs_std: 0.001
device: cuda
image_encoder_name: convnext_tiny
batch_size: 96
max_length: 256
run_name: convnext_tiny_cxrbert_baseline_full_checkpoint_bs96
run_family: convnext
model_type: convnext_tiny
experiment_name: checkpoint_full_convnext_tiny_cxrbert_baseline_full_checkpoint_bs96
experiment_dir: experiments/checkpoint_full/convnext_tiny_cxrbert_baseline_full_checkpoint_bs96
resources:
  expected_vram_mb: 30000
  family: convnext
  model_type: convnext_tiny
  stage: checkpoint_full
run_stage: checkpoint_full
text_variant: cxrbert_unfrozen
fusion_type: baseline
fusion_variant: baseline
save_best_checkpoint: true
save_last_checkpoint: true
save_optimizer_state: false
save_scheduler_state: false
checkpoint_monitor: valid_roc_auc
checkpoint_mode: max
